<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Background Circle -->
  <circle cx="24" cy="24" r="22" fill="#1e293b" stroke="#ff6b35" stroke-width="2"/>
  
  <!-- Building Structure -->
  <g fill="none" stroke="#ff6b35" stroke-width="1.5">
    <!-- Foundation -->
    <rect x="8" y="34" width="32" height="10" fill="#ff6b35" opacity="0.8"/>
    
    <!-- Main Building -->
    <rect x="10" y="16" width="28" height="18" fill="#ff6b35" opacity="0.3"/>
    
    <!-- Columns -->
    <rect x="13" y="16" width="2" height="18" fill="#ff6b35" opacity="0.8"/>
    <rect x="19" y="16" width="2" height="18" fill="#ff6b35" opacity="0.8"/>
    <rect x="25" y="16" width="2" height="18" fill="#ff6b35" opacity="0.8"/>
    <rect x="31" y="16" width="2" height="18" fill="#ff6b35" opacity="0.8"/>
    
    <!-- Roof -->
    <polygon points="7,16 24,6 41,16" fill="#ff6b35" opacity="0.6"/>
    
    <!-- Crane -->
    <line x1="24" y1="6" x2="24" y2="2" stroke="#ff6b35" stroke-width="2"/>
    <line x1="22" y1="4" x2="26" y2="4" stroke="#ff6b35" stroke-width="1"/>
  </g>
  
  <!-- SIVILIZE Text -->
  <text x="24" y="44" text-anchor="middle" fill="white" font-size="4" font-weight="bold" font-family="Arial, sans-serif">
    SIVILIZE
  </text>
</svg>